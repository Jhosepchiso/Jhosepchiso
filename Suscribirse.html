<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscribirse - MusicCode</title>
    <link rel="stylesheet" href="css/estiloSuscribirme.css">
    <link rel="shortcut icon" href="img/iconoM.ico" type="x-icon">
</head>
<body>
    <nav>
        <div class="contenedor-nav">
            <h1 class="logo">MusicCode</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Inicio</a>
            </div>
        </div>
    </nav>

    <header>
        <h1 class="letrasG">Suscríbete a <em>MusicCode</em></h1>
        <p>Recibe noticias, ejercicios y consejos musicales directamente en tu correo.</p>
    </header>
    <section class="tema-musical">
        <h2>Formulario de suscripción</h2>
        
        <form action="#" class="formulario-suscripcion">
            <div class="campo">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="campo">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="nivel">Nivel musical:</label>
                <select id="nivel" name="nivel">
                    <option value="principiante">Principiante</option>
                    <option value="intermedio">Intermedio</option>
                    <option value="avanzado">Avanzado</option>
                </select>
            </div>

            <button type="submit" class="btn btn-principal">Suscribirme</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 MusicCode. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
